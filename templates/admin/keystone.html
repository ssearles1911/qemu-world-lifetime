{% extends "admin/_layout.html" %}
{% block admin_body %}
<h1 class="text-2xl font-semibold mb-2">Keystone</h1>
<p class="text-sm text-gray-600 mb-4">
  Keystone v3 endpoint used to sign in OpenStack users. A user must hold
  the required role below to log in; logged-in Keystone users are treated
  as administrators.
</p>
<form method="post" class="space-y-3 max-w-xl">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label class="block">
    <span class="text-sm font-medium">Auth URL</span>
    <input type="url" name="keystone_auth_url" required
           value="{{ keystone_auth_url }}"
           placeholder="http://controller.example.com:5000/v3"
           class="form-input mt-1 w-full">
  </label>
  <label class="block">
    <span class="text-sm font-medium">Default user domain</span>
    <input type="text" name="keystone_default_domain"
           value="{{ keystone_default_domain }}"
           class="form-input mt-1 w-full">
  </label>
  <label class="block">
    <span class="text-sm font-medium">Required login role</span>
    <input type="text" name="keystone_admin_role"
           value="{{ keystone_admin_role }}"
           placeholder="admin"
           class="form-input mt-1 w-full">
    <span class="text-xs text-gray-500 mt-1 block">
      A Keystone user must hold this role (on any project or domain) to
      sign in. Default: <code>admin</code>.
    </span>
  </label>
  <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
