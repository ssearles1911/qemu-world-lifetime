{% extends "admin/_layout.html" %}
{% block admin_body %}
<h1 class="text-2xl font-semibold mb-2">Keystone</h1>
<p class="text-sm text-gray-600 mb-4">
  Keystone v3 endpoint used to authenticate non-administrator users and
  to resolve their effective project list.
</p>
<form method="post" class="space-y-3 max-w-xl">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label class="block">
    <span class="text-sm font-medium">Auth URL</span>
    <input type="url" name="keystone_auth_url" required
           value="{{ keystone_auth_url }}"
           placeholder="http://controller.example.com:5000/v3"
           class="form-input mt-1 w-full">
  </label>
  <label class="block">
    <span class="text-sm font-medium">Default user domain</span>
    <input type="text" name="keystone_default_domain"
           value="{{ keystone_default_domain }}"
           class="form-input mt-1 w-full">
  </label>
  <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
