{% extends "base.html" %}
{% block title %}Error — OpenStack Ops BI{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-3">Something went wrong</h1>

<div class="bg-red-50 border border-red-300 text-red-800 rounded p-3 mb-4">
  <strong>{{ exception_type }}:</strong> {{ exception_message }}
</div>

<details open class="card card-body mb-4">
  <summary class="cursor-pointer font-medium">Traceback</summary>
  <pre class="mt-2 text-xs overflow-x-auto bg-gray-100 p-3 rounded">{{ traceback }}</pre>
</details>

<a href="{{ url_for('catalog') }}" class="btn btn-outline">← Back to reports</a>
{% endblock %}
